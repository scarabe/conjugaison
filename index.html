function rand(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
function getPronouns(id){ if(id==="present_imp") return IMP_PRONOUNS; if(NODECL.includes(id)) return ["_"]; return PRONOUNS; }
function pickQuestion(tenses){
  const verb=rand(VERBS); const tId=rand(tenses);
  const prons=getPronouns(tId).filter(p=>verb.forms[tId]?.[p]);
  if(!prons.length) return pickQuestion(tenses);
  const pron=rand(prons); const form=verb.forms[tId][pron];
  return {verb:verb.inf,tenseId:tId,pronoun:pron,form};
}
function buildChoices(correctId,tenses){
  const others=tenses.filter(id=>id!==correctId).sort(()=>Math.random()-0.5).slice(0,3);
  return [...others,correctId].sort(()=>Math.random()-0.5);
}
function getTense(id){ return ALL_TENSES.find(t=>t.id===id); }

// ─── APP ─────────────────────────────────────────────────────────────────────
function App(){
  const [screen,setScreen]=useState("home");
  const [mode,setMode]=useState(null); // "libre" | "balisee"
  const [prenom,setPrenom]=useState("");
  const [teacherCode,setTeacherCode]=useState("");
  const [teacherError,setTeacherError]=useState(false);
  const [baliseedTenses,setBaliseedTenses]=useState(BALISEE_DEFAULT);
  const [teacherUnlocked,setTeacherUnlocked]=useState(false);
  const [activeTenses,setActiveTenses]=useState(DEFAULT_ACTIVE);
  const [maxQ,setMaxQ]=useState(10);
  const [q,setQ]=useState(null);
  const [choices,setChoices]=useState([]);
  const [answered,setAnswered]=useState(null);
  const [chosen,setChosen]=useState(null);
  const [score,setScore]=useState(0);       // bonnes réponses brutes
  const [total,setTotal]=useState(0);
  const [streak,setStreak]=useState(0);
  const [bestStreak,setBestStreak]=useState(0);
  const [timeLeft,setTimeLeft]=useState(0); // chrono global affiché
  const [qTimeLeft,setQTimeLeft]=useState(8); // chrono par question
  const [gameOver,setGameOver]=useState(false);
  const [speedBonuses,setSpeedBonuses]=useState([]); // bonus vitesse par bonne réponse [0..1]
  const [sendStatus,setSendStatus]=useState(null); // null | "sending" | "ok" | "error"
  const timerRef=useRef(null);

  const SHEET_URL="https://script.google.com/macros/s/AKfycbzKX57-f1eSW_9ay8iv2F0NGuPfHnkxwRbhr9h8mFrzQ9FnfzJGYibVEzMC2aK8yk52/exec";

  const sendToSheet=(p,s100,sc,tot)=>{
    setSendStatus("sending");
    const precision=tot>0?Math.round(sc/tot*100):0;
    fetch(SHEET_URL,{
      method:"POST",
      mode:"no-cors",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({prenom:p,score100:s100,score:sc,total:tot,precision,mode:"balisee"}),
    })
    .then(()=>setSendStatus("ok"))
    .catch(()=>setSendStatus("error"));
  };
  const qTimerRef=useRef(null);
  const qTimeRef=useRef(8); // valeur live du chrono question

  // Score /100 : chaque bonne réponse = (60/maxQ) pts justesse + bonus_vitesse*(40/maxQ) pts
  // Fausse réponse = 0 pt. Tout bon + tout instantané = 100. Toujours juste.
  const computeScore100=(bonuses,nq)=>{
    if(nq===0) return 0;
    const justessePts = bonuses.length * (60/nq);
    const rapiditePts = bonuses.reduce((a,b)=>a+b,0) * (40/nq);
    return Math.round(justessePts + rapiditePts);
  };
  const score100=computeScore100(speedBonuses,maxQ);

  const stopTimer=()=>{
    if(timerRef.current) clearInterval(timerRef.current);
    if(qTimerRef.current) clearInterval(qTimerRef.current);
  };

  const startQTimer=()=>{
    if(qTimerRef.current) clearInterval(qTimerRef.current);
    qTimeRef.current=8;
    setQTimeLeft(8);
    qTimerRef.current=setInterval(()=>{
      qTimeRef.current=qTimeRef.current-1;
      setQTimeLeft(qTimeRef.current);
      if(qTimeRef.current<=0){
        clearInterval(qTimerRef.current);
        // temps écoulé sur cette question = mauvaise réponse automatique
        setAnswered("wrong");
        setChosen("__timeout__");
        setTotal(t=>{
          const nt=t+1;
          if(nt>=maxQ){ stopTimer(); setTimeout(()=>setGameOver(true),900); }
          return nt;
        });
        setStreak(0);
      }
    },1000);
  };

  const nextQ=useCallback((tenses,t=activeTenses)=>{
    const question=pickQuestion(tenses||t);
    setQ(question);
    setChoices(buildChoices(question.tenseId,tenses||t));
    setAnswered(null);
    setChosen(null);
    startQTimer();
  },[activeTenses]);

  const startGame=(tensesToUse)=>{
    const tenses=tensesToUse||activeTenses;
    stopTimer();
    setScore(0);setTotal(0);setStreak(0);setBestStreak(0);setSpeedBonuses([]);setSendStatus(null);
    setGameOver(false);
    const duration=maxQ*8;
    setTimeLeft(duration);
    setScreen("game");
    // global timer (affichage)
    timerRef.current=setInterval(()=>{
      setTimeLeft(prev=>{
        if(prev<=1){ stopTimer(); setGameOver(true); return 0; }
        return prev-1;
      });
    },1000);
    // first question (nextQ starts its own qTimer)
    const question=pickQuestion(tenses);
    setQ(question);
    setChoices(buildChoices(question.tenseId,tenses));
    setAnswered(null);
    setChosen(null);
    // start q timer
    qTimeRef.current=8;
    setQTimeLeft(8);
    qTimerRef.current=setInterval(()=>{
      qTimeRef.current=qTimeRef.current-1;
      setQTimeLeft(qTimeRef.current);
      if(qTimeRef.current<=0){
        clearInterval(qTimerRef.current);
        setAnswered("wrong");
        setChosen("__timeout__");
        setTotal(t=>{
          const nt=t+1;
          if(nt>=maxQ){ stopTimer(); setTimeout(()=>setGameOver(true),900); }
          return nt;
        });
        setStreak(0);
      }
    },1000);
  };

  useEffect(()=>()=>stopTimer(),[]);

  // Envoi vers Google Sheets uniquement en mode balisée
  useEffect(()=>{
    if(gameOver && total>0 && mode==="balisee"){
      const s100=computeScore100(speedBonuses,maxQ);
      sendToSheet(prenom,s100,score,total);
    }
  },[gameOver]);

  const handleChoice=(id)=>{
    if(answered||gameOver) return;
    clearInterval(qTimerRef.current); // stop question timer
    const timeUsed=8-qTimeRef.current; // secondes utilisées
    const correct=id===q.tenseId;
    setChosen(id);
    setAnswered(correct?"correct":"wrong");
    const newTotal=total+1;
    setTotal(newTotal);
    if(correct){
      setScore(s=>s+1);
      setStreak(s=>{ const ns=s+1; setBestStreak(b=>Math.max(b,ns)); return ns; });
      // bonus vitesse : courbe exponentielle — répondre vite est bien récompensé
      // 1s → ~1.0 | 4s → ~0.5 | 8s → 0
      const bonus=Math.max(0, Math.pow((8-timeUsed)/8, 1.5));
      setSpeedBonuses(prev=>[...prev,bonus]);
    } else { setStreak(0); }
    if(newTotal>=maxQ){ stopTimer(); setTimeout(()=>setGameOver(true),900); }
  };

  const handleNext=()=>{ if(total<maxQ) nextQ(mode==="balisee"?baliseedTenses:activeTenses); };
  const toggleTense=(id)=>setActiveTenses(prev=>prev.includes(id)?prev.filter(t=>t!==id):[...prev,id]);
  const modeGroups=[...new Set(ALL_TENSES.map(t=>t.mode))];
  const timePct=timeLeft/(maxQ*8)*100;
  const timeIsLow=timeLeft<=10;
  const qTimePct=qTimeLeft/8*100;
  const qTimeIsLow=qTimeLeft<=3;

  // ── HOME SCREEN ──────────────────────────────────────────────────────────
  if(screen==="home") return (
    <div style={{minHeight:"100vh",background:C.bg,color:C.text,fontFamily:"'Georgia',serif",display:"flex",alignItems:"center",justifyContent:"center",padding:"1rem"}}>
      <style>{globalCss}</style>
      <div style={{maxWidth:400,width:"100%",textAlign:"center"}} className="fadein">
        <button onClick={()=>setScreen("home")} style={{background:"none",border:"none",color:C.textMid,cursor:"pointer",fontFamily:"Georgia,serif",fontSize:"0.82rem",marginBottom:"1rem",padding:0}}>
          ← Retour
        </button>
        <div style={{fontSize:"3rem",marginBottom:"0.8rem"}}>{mode==="balisee"?"🎯":"🕹️"}</div>
        <h1 style={{fontSize:"2.2rem",color:C.text,margin:"0 0 0.3rem",letterSpacing:"-0.02em"}}>{mode==="balisee"?"Partie balisée":"Entraînement libre"}</h1>
        <p style={{color:C.accent,fontStyle:"italic",margin:"0 0 2.5rem",fontSize:"1rem"}}>Reconnaître le temps verbal</p>
        <div style={{display:"flex",flexDirection:"column",gap:"1rem"}}>
          <button onClick={()=>{setMode("balisee");setScreen("name");}} className="startbtn" style={{
            padding:"1.1rem",background:C.accent,color:"#0d1117",border:"none",borderRadius:10,
            fontSize:"1.05rem",fontFamily:"Georgia,serif",cursor:"pointer",fontWeight:"bold",
            boxShadow:`0 0 24px rgba(79,156,249,0.3)`,letterSpacing:"0.02em",
          }}>
            🎯 Partie balisée
          </button>
          <div style={{fontSize:"0.75rem",color:C.textDim,fontStyle:"italic",marginTop:"-0.4rem",marginBottom:"0.4rem"}}>
            Temps imposés par l'enseignant · Score envoyé
          </div>
          <button onClick={()=>{setMode("libre");setActiveTenses(DEFAULT_ACTIVE);setScreen("name");}} className="startbtn" style={{
            padding:"1.1rem",background:C.surface,color:C.text,border:`1.5px solid ${C.border}`,borderRadius:10,
            fontSize:"1.05rem",fontFamily:"Georgia,serif",cursor:"pointer",fontWeight:"normal",
          }}>
            🕹️ Entraînement libre
          </button>
          <div style={{fontSize:"0.75rem",color:C.textDim,fontStyle:"italic",marginTop:"-0.4rem"}}>
            Tu choisis tes temps · Pas d'envoi de score
          </div>
        </div>
        <div style={{marginTop:"2.5rem",borderTop:`1px solid ${C.border}`,paddingTop:"1.2rem"}}>
          <button onClick={()=>setScreen("teacher")} style={{
            background:"none",border:"none",color:C.textDim,cursor:"pointer",
            fontSize:"0.75rem",fontFamily:"Georgia,serif",
          }}>
            ⚙️ Accès enseignant
          </button>
        </div>
      </div>
    </div>
  );

  // ── TEACHER SCREEN ────────────────────────────────────────────────────────
  if(screen==="teacher") return (
    <div style={{minHeight:"100vh",background:C.bg,color:C.text,fontFamily:"'Georgia',serif",display:"flex",alignItems:"center",justifyContent:"center",padding:"1rem"}}>
      <style>{globalCss}</style>
      <div style={{maxWidth:420,width:"100%"}} className="fadein">
        <button onClick={()=>setScreen("home")} style={{background:"none",border:"none",color:C.textMid,cursor:"pointer",fontFamily:"Georgia,serif",fontSize:"0.82rem",marginBottom:"1.5rem",padding:0}}>
          ← Retour
        </button>
        <h2 style={{fontSize:"1.5rem",color:C.text,marginBottom:"0.3rem"}}>Accès enseignant</h2>
        <p style={{color:C.textMid,fontSize:"0.85rem",fontStyle:"italic",marginBottom:"1.5rem"}}>Configure les temps de la partie balisée</p>

        {!teacherUnlocked ? (
          <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,padding:"1.5rem"}}>
            <label style={{display:"block",fontSize:"0.78rem",textTransform:"uppercase",letterSpacing:"0.1em",color:C.textMid,marginBottom:"0.8rem"}}>
              Code enseignant
            </label>
            <input
              autoFocus type="password" value={teacherCode}
              onChange={e=>{setTeacherCode(e.target.value);setTeacherError(false);}}
              onKeyDown={e=>{if(e.key==="Enter"){if(teacherCode===TEACHER_CODE){setTeacherUnlocked(true);setTeacherError(false);}else{setTeacherError(true);}}}}
              placeholder="••••••••"
              style={{width:"100%",padding:"0.75rem 1rem",background:C.surface2,border:`1.5px solid ${teacherError?C.red:C.border}`,borderRadius:8,color:C.text,fontSize:"1.1rem",fontFamily:"Georgia,serif",outline:"none",boxSizing:"border-box",textAlign:"center"}}
            />
            {teacherError&&<div style={{color:C.red,fontSize:"0.8rem",marginTop:"0.5rem",fontStyle:"italic"}}>Code incorrect</div>}
            <button onClick={()=>{if(teacherCode===TEACHER_CODE){setTeacherUnlocked(true);setTeacherError(false);}else{setTeacherError(true);}}}
              className="startbtn" style={{display:"block",width:"100%",marginTop:"1rem",padding:"0.8rem",background:C.accent,color:"#0d1117",border:"none",borderRadius:8,fontSize:"1rem",fontFamily:"Georgia,serif",cursor:"pointer",fontWeight:"bold"}}>
              Déverrouiller
            </button>
          </div>
        ) : (
          <div>
            <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,padding:"1.2rem 1.5rem",marginBottom:"1rem"}}>
              <div style={labelStyle}>Temps actifs en partie balisée</div>
              {[...new Set(ALL_TENSES.map(t=>t.mode))].map(mode=>(
                <div key={mode} style={{marginBottom:"0.8rem"}}>
                  <div style={{fontSize:"0.7rem",textTransform:"uppercase",letterSpacing:"0.12em",color:C.accent,marginBottom:"0.4rem"}}>{mode}</div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:"0.4rem"}}>
                    {ALL_TENSES.filter(t=>t.mode===mode).map(t=>{
                      const on=baliseedTenses.includes(t.id);
                      return (
                        <button key={t.id} onClick={()=>setBaliseedTenses(prev=>on?prev.filter(x=>x!==t.id):[...prev,t.id])} className="pill" style={{
                          ...pillBase,background:on?C.accentDim:"transparent",borderColor:on?C.accent:C.border,color:on?C.accent:C.textMid,
                        }}>
                          {on&&<span style={{fontSize:"0.65rem",marginRight:3}}>✓</span>}{t.label}
                        </button>
                      );
                    })}
                  </div>
                </div>
              ))}
              <div style={{fontSize:"0.78rem",color:C.textDim,fontStyle:"italic",marginTop:"0.5rem"}}>
                {baliseedTenses.length} temps sélectionné{baliseedTenses.length>1?"s":""}
                {baliseedTenses.length<2&&<span style={{color:C.red,marginLeft:8}}>— min. 2 requis</span>}
              </div>
            </div>
            <button onClick={()=>{setTeacherUnlocked(false);setTeacherCode("");setScreen("home");}} className="startbtn"
              style={{display:"block",width:"100%",padding:"0.85rem",background:C.green,color:"#0d1117",border:"none",borderRadius:8,fontSize:"1rem",fontFamily:"Georgia,serif",cursor:"pointer",fontWeight:"bold"}}>
              ✓ Enregistrer et retourner
            </button>
          </div>
        )}
      </div>
    </div>
  );

  // ── NAME SCREEN ───────────────────────────────────────────────────────────
  if(screen==="name") return (
    <div style={{minHeight:"100vh",background:C.bg,color:C.text,fontFamily:"'Georgia',serif",display:"flex",alignItems:"center",justifyContent:"center",padding:"1rem"}}>
      <style>{globalCss}</style>
      <div style={{maxWidth:400,width:"100%",textAlign:"center"}} className="fadein">
        <button onClick={()=>setScreen("home")} style={{background:"none",border:"none",color:C.textMid,cursor:"pointer",fontFamily:"Georgia,serif",fontSize:"0.82rem",marginBottom:"1rem",padding:0}}>
          ← Retour
        </button>
        <div style={{fontSize:"3rem",marginBottom:"0.8rem"}}>{mode==="balisee"?"🎯":"🕹️"}</div>
        <h1 style={{fontSize:"2.2rem",color:C.text,margin:"0 0 0.3rem",letterSpacing:"-0.02em"}}>{mode==="balisee"?"Partie balisée":"Entraînement libre"}</h1>
        <p style={{color:C.accent,fontStyle:"italic",margin:"0 0 2.5rem",fontSize:"1rem"}}>Reconnaître le temps verbal</p>

        <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,padding:"2rem"}}>
          <label style={{display:"block",fontSize:"0.78rem",textTransform:"uppercase",letterSpacing:"0.1em",color:C.textMid,marginBottom:"0.8rem"}}>
            Ton prénom
          </label>
          <input
            autoFocus
            type="text"
            value={prenom}
            onChange={e=>setPrenom(e.target.value)}
            onKeyDown={e=>e.key==="Enter"&&prenom.trim().length>=2&&(mode==="balisee"?startGame(baliseedTenses):setScreen("setup"))}
            placeholder="Écris ton prénom…"
            style={{
              width:"100%",padding:"0.75rem 1rem",background:C.surface2,
              border:`1.5px solid ${prenom.trim().length>=2?C.accent:C.border}`,
              borderRadius:8,color:C.text,fontSize:"1.1rem",fontFamily:"Georgia,serif",
              outline:"none",boxSizing:"border-box",textAlign:"center",
              transition:"border-color 0.2s",
            }}
          />
          <button
            onClick={()=>mode==="balisee"?startGame(baliseedTenses):setScreen("setup")}
            disabled={prenom.trim().length<2}
            className="startbtn"
            style={{
              display:"block",width:"100%",marginTop:"1.2rem",padding:"0.85rem",
              background:prenom.trim().length>=2?C.accent:"#21262d",
              color:prenom.trim().length>=2?"#0d1117":C.textDim,
              border:"none",borderRadius:8,fontSize:"1rem",fontFamily:"Georgia,serif",
              cursor:prenom.trim().length>=2?"pointer":"not-allowed",fontWeight:"bold",
              transition:"all 0.2s",
              boxShadow:prenom.trim().length>=2?`0 0 20px rgba(79,156,249,0.25)`:"none",
            }}
          >
            Continuer →
          </button>
        </div>
      </div>
    </div>
  );

  // ── SETUP ─────────────────────────────────────────────────────────────────
  if(screen==="setup") return (
    <div style={{minHeight:"100vh",background:C.bg,color:C.text,fontFamily:"'Georgia',serif",padding:"2rem 1rem 4rem",boxSizing:"border-box"}}>
      <style>{globalCss}</style>
      <div style={{maxWidth:620,margin:"0 auto"}}>
        <div style={{textAlign:"center",marginBottom:"2.5rem"}}>
          <div style={{fontSize:"0.75rem",color:C.textMid,marginBottom:"0.5rem",textTransform:"uppercase",letterSpacing:"0.1em"}}>🕹️ Entraînement libre</div>
          <h1 style={{fontSize:"2.4rem",color:C.text,margin:"0 0 0.3rem",fontWeight:"bold",letterSpacing:"-0.02em"}}>
            Bonjour, {prenom} !
          </h1>
          <p style={{color:C.accent,fontStyle:"italic",margin:0,fontSize:"1.05rem"}}>
            Configure ta session
          </p>
        </div>

        {/* Nombre de questions */}
        <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,padding:"1.2rem 1.5rem",marginBottom:"1.5rem"}}>
          <div style={labelStyle}>Nombre de questions</div>
          <div style={{display:"flex",gap:"0.6rem"}}>
            {[10,20].map(n=>(
              <button key={n} onClick={()=>setMaxQ(n)} className="pill" style={{
                ...pillBase,
                background:maxQ===n?C.accentDim:"transparent",
                borderColor:maxQ===n?C.accent:C.border,
                color:maxQ===n?C.accent:C.textMid,
                fontSize:"1rem",padding:"0.45rem 1.4rem",fontWeight:maxQ===n?"bold":"normal"
              }}>{n} questions</button>
            ))}
          </div>
        </div>

        {/* Temps */}
        <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,padding:"1.2rem 1.5rem",marginBottom:"1.5rem"}}>
          <div style={labelStyle}>Temps à inclure</div>
          {modeGroups.map(mode=>(
            <div key={mode} style={{marginBottom:"1rem"}}>
              <div style={{fontSize:"0.72rem",textTransform:"uppercase",letterSpacing:"0.12em",color:C.accent,marginBottom:"0.45rem"}}>{mode}</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:"0.4rem"}}>
                {ALL_TENSES.filter(t=>t.mode===mode).map(t=>{
                  const on=activeTenses.includes(t.id);
                  return (
                    <button key={t.id} onClick={()=>toggleTense(t.id)} className="pill" style={{
                      ...pillBase,
                      background:on?C.accentDim:"transparent",
                      borderColor:on?C.accent:C.border,
                      color:on?C.accent:C.textMid,
                    }}>
                      {on&&<span style={{fontSize:"0.65rem",marginRight:3}}>✓</span>}{t.label}
                    </button>
                  );
                })}
              </div>
            </div>
          ))}
          <div style={{marginTop:"0.5rem",fontSize:"0.8rem",color:C.textDim,fontStyle:"italic"}}>
            {activeTenses.length} temps sélectionné{activeTenses.length>1?"s":""}
            {activeTenses.length<2&&<span style={{color:C.red,marginLeft:8}}>— min. 2 requis</span>}
          </div>
        </div>

        <button onClick={()=>startGame(activeTenses)} disabled={activeTenses.length<2} className="startbtn" style={{
          display:"block",width:"100%",padding:"0.9rem",
          background:activeTenses.length<2?"#21262d":C.accent,
          color:activeTenses.length<2?C.textDim:"#0d1117",
          border:"none",borderRadius:8,fontSize:"1rem",fontFamily:"Georgia,serif",
          cursor:activeTenses.length<2?"not-allowed":"pointer",fontWeight:"bold",
          letterSpacing:"0.04em",transition:"all 0.15s",
          boxShadow:activeTenses.length>=2?`0 0 20px rgba(79,156,249,0.25)`:"none",
        }}>
          Commencer → {maxQ} questions · {maxQ*8}s
        </button>
      </div>
    </div>
  );

  if(gameOver) return (
    <div style={{minHeight:"100vh",background:C.bg,color:C.text,fontFamily:"'Georgia',serif",display:"flex",alignItems:"center",justifyContent:"center",padding:"1rem"}}>
      <style>{globalCss}</style>
      <div style={{maxWidth:480,width:"100%",textAlign:"center"}} className="fadein">
        <div style={{fontSize:"3.5rem",marginBottom:"0.5rem"}}>
          {score100>=80?"🏆":score100>=55?"👍":"📚"}
        </div>
        <h2 style={{fontSize:"2rem",margin:"0 0 0.3rem",color:C.text}}>Bravo, {prenom} !</h2>
        <p style={{color:C.textMid,fontStyle:"italic",marginBottom:"1.5rem"}}>
          {score100>=80?"Excellent travail !":score100>=55?"Bien joué !":"Continue à t'entraîner !"}
        </p>

        {/* Score /100 mis en avant */}
        <div style={{background:C.surface,border:`2px solid ${score100>=80?C.green:score100>=55?C.gold:C.red}`,borderRadius:12,padding:"1.5rem",marginBottom:"1.2rem",position:"relative",overflow:"hidden"}}>
          <div style={{fontSize:"0.72rem",textTransform:"uppercase",letterSpacing:"0.12em",color:C.textMid,marginBottom:"0.3rem"}}>Score final</div>
          <div style={{fontSize:"4rem",fontWeight:"bold",color:score100>=80?C.green:score100>=55?C.gold:C.red,lineHeight:1}}>{score100}</div>
          <div style={{fontSize:"1rem",color:C.textDim,marginTop:"0.2rem"}}>/100</div>
          {/* barre de progression */}
          <div style={{marginTop:"1rem",height:6,background:C.surface2,borderRadius:3,overflow:"hidden"}}>
            <div style={{height:"100%",width:`${score100}%`,background:score100>=80?C.green:score100>=55?C.gold:C.red,borderRadius:3,transition:"width 1s ease"}}/>
          </div>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:"0.68rem",color:C.textDim,marginTop:"0.3rem"}}>
            <span>Justesse × 60%</span><span>Rapidité × 40%</span>
          </div>
        </div>

        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"0.6rem",marginBottom:"1.5rem"}}>
          {[
            {label:"Réponses",val:`${score}/${total}`,color:C.accent},
            {label:"Précision",val:`${total>0?Math.round(score/total*100):0}%`,color:score/total>=0.7?C.green:C.gold},
            {label:"Meilleure série",val:`🔥${bestStreak}`,color:C.gold},
          ].map(item=>(
            <div key={item.label} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,padding:"0.8rem"}}>
              <div style={{fontSize:"1.4rem",fontWeight:"bold",color:item.color}}>{item.val}</div>
              <div style={{fontSize:"0.68rem",color:C.textMid,textTransform:"uppercase",letterSpacing:"0.08em",marginTop:"0.2rem"}}>{item.label}</div>
            </div>
          ))}
        </div>

        {/* Statut envoi Google Sheets */}
        <div style={{marginBottom:"0.8rem",fontSize:"0.8rem",fontStyle:"italic",color:sendStatus==="ok"?C.green:sendStatus==="error"?C.red:C.textDim,minHeight:"1.2rem"}}>
          {sendStatus==="sending"&&"⏳ Envoi du score en cours…"}
          {sendStatus==="ok"&&"✓ Score enregistré dans Google Sheets !"}
          {sendStatus==="error"&&"⚠️ Échec de l'envoi — vérifie ta connexion."}
        </div>

        <div style={{display:"flex",gap:"0.8rem"}}>
          <button onClick={()=>startGame(mode==="balisee"?baliseedTenses:activeTenses)} className="startbtn" style={{flex:1,padding:"0.8rem",background:C.accent,color:"#0d1117",border:"none",borderRadius:8,fontSize:"0.95rem",fontFamily:"Georgia,serif",cursor:"pointer",fontWeight:"bold"}}>
            Rejouer
          </button>
          <button onClick={()=>{stopTimer();setScreen("home");setPrenom("");}} className="startbtn" style={{flex:1,padding:"0.8rem",background:C.surface2,color:C.text,border:`1px solid ${C.border}`,borderRadius:8,fontSize:"0.95rem",fontFamily:"Georgia,serif",cursor:"pointer"}}>
            Changer d'élève
          </button>
        </div>
      </div>
    </div>
  );

  // ── GAME ─────────────────────────────────────────────────────────────────
  if(!q) return null;
  const correctTense=getTense(q.tenseId);
  const pct=total>0?Math.round(score/total*100):0;
  const displayPron=q.pronoun==="_"?null:q.pronoun;

  return (
    <div style={{minHeight:"100vh",background:C.bg,color:C.text,fontFamily:"'Georgia',serif",padding:"1.5rem 1rem 3rem",boxSizing:"border-box"}}>
      <style>{globalCss}</style>
      <div style={{maxWidth:580,margin:"0 auto"}}>

        {/* Header */}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"0.8rem"}}>
          <button onClick={()=>{stopTimer();setScreen("home");setPrenom("");}} className="backbtn" style={{background:"none",border:"none",color:C.textMid,cursor:"pointer",fontFamily:"Georgia,serif",fontSize:"0.82rem",padding:0}}>
            ← Quitter
          </button>
          <div style={{display:"flex",alignItems:"center",gap:"0.8rem"}}>
            {streak>=3&&<span style={{fontSize:"0.85rem",color:C.gold}}>🔥{streak}</span>}
            <span style={{background:C.surface2,border:`1px solid ${C.border}`,borderRadius:6,padding:"0.2rem 0.7rem",fontSize:"0.9rem",color:C.accent,fontWeight:"bold"}}>
              {score100}<span style={{fontSize:"0.65rem",color:C.textMid,fontWeight:"normal"}}>/100</span>
            </span>
            <span style={{background:C.surface2,border:`1px solid ${C.border}`,borderRadius:6,padding:"0.2rem 0.7rem",fontSize:"0.82rem",color:C.textMid}}>
              {score}/{total}
            </span>
          </div>
        </div>

        {/* Global timer bar */}
        <div style={{height:3,background:C.surface2,borderRadius:3,marginBottom:"0.4rem",overflow:"hidden"}}>
          <div style={{height:"100%",width:`${timePct}%`,background:timeIsLow?C.red:C.textDim,borderRadius:3,transition:"width 1s linear"}}/>
        </div>
        <div style={{textAlign:"right",fontSize:"0.72rem",color:C.textDim,marginBottom:"0.9rem"}}>
          {total}/{maxQ} questions · ⏱ {timeLeft}s
        </div>

        {/* Per-question timer bar */}
        <div style={{height:6,background:C.surface2,borderRadius:3,marginBottom:"1.2rem",overflow:"hidden"}}>
          <div style={{
            height:"100%",width:`${qTimePct}%`,borderRadius:3,
            background:qTimeIsLow?C.red:qTimeLeft<=5?C.gold:C.green,
            transition:"width 1s linear, background 0.3s",
          }}/>
        </div>

        {/* Question */}
        <div className="qcard" style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,padding:"1.8rem",marginBottom:"1.2rem",textAlign:"center"}}>
          <div style={{fontSize:"0.7rem",textTransform:"uppercase",letterSpacing:"0.14em",color:C.textDim,marginBottom:"0.8rem"}}>
            {q.verb}
          </div>
          <div style={{display:"flex",justifyContent:"center",alignItems:"baseline",gap:"0.7rem",marginBottom:"0.7rem"}}>
            {displayPron&&<span style={{fontSize:"1.4rem",fontStyle:"italic",color:C.textMid}}>{displayPron}</span>}
            <span style={{fontSize:"2.2rem",fontWeight:"bold",color:C.text,letterSpacing:"-0.02em"}}>{q.form}</span>
          </div>
          <div style={{fontSize:"0.78rem",fontStyle:"italic",color:C.textDim}}>Identifie le temps verbal</div>
        </div>

        {/* Choices */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0.55rem",marginBottom:"1rem"}}>
          {choices.map(id=>{
            const t=getTense(id);
            const isCorrect=id===q.tenseId;
            const isChosen=id===chosen;
            let bg=C.surface2, border=C.border, col=C.text;
            if(answered){
              if(isCorrect){bg=C.greenDim;border=C.green;col=C.green;}
              else if(isChosen){bg=C.redDim;border=C.red;col=C.red;}
              else{bg="transparent";border=C.textDim;col=C.textDim;}
            }
            return (
              <button key={id} onClick={()=>handleChoice(id)}
                className={answered?"":"choicebtn"}
                style={{padding:"0.75rem 0.5rem",background:bg,border:`1.5px solid ${border}`,borderRadius:8,cursor:answered?"default":"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:"0.1rem",transition:"all 0.15s",fontFamily:"Georgia,serif"}}>
                <span style={{fontSize:"0.62rem",textTransform:"uppercase",letterSpacing:"0.1em",color:answered?(isCorrect?C.green:isChosen?C.red:C.textDim):C.textMid}}>{t.mode}</span>
                <span style={{fontSize:"0.92rem",fontWeight:"bold",color:col}}>{t.label}</span>
              </button>
            );
          })}
        </div>

        {answered&&(
          <div className="fadein" style={{
            padding:"0.7rem 1rem",borderRadius:8,marginBottom:"0.8rem",fontSize:"0.87rem",fontStyle:"italic",
            background:answered==="correct"?C.greenDim:C.redDim,
            borderLeft:`3px solid ${answered==="correct"?C.green:C.red}`,
            color:answered==="correct"?C.green:C.red,
          }}>
            {answered==="correct"
              ?`✓ Exact ! ${correctTense.mode} · ${correctTense.label}`
              :chosen==="__timeout__"
                ?`⏰ Temps écoulé ! C'était : ${correctTense.mode} · ${correctTense.label}`
                :`✗ C'était : ${correctTense.mode} · ${correctTense.label}`}
          </div>
        )}

        {answered&&total<maxQ&&(
          <button onClick={handleNext} className="startbtn" style={{display:"block",width:"100%",padding:"0.75rem",background:C.accent,color:"#0d1117",border:"none",borderRadius:8,fontSize:"0.95rem",fontFamily:"Georgia,serif",cursor:"pointer",fontWeight:"bold",letterSpacing:"0.03em"}}>
            Question suivante →
          </button>
        )}
      </div>
    </div>
  );
}

// ─── SHARED STYLES ────────────────────────────────────────────────────────────
const labelStyle={fontSize:"0.72rem",textTransform:"uppercase",letterSpacing:"0.1em",color:"#8b949e",marginBottom:"0.7rem"};
const pillBase={borderRadius:6,border:"1.5px solid",fontSize:"0.82rem",cursor:"pointer",fontFamily:"Georgia,serif",transition:"all 0.15s"};

const globalCss=`
  @keyframes slideUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  @keyframes fadein{from{opacity:0}to{opacity:1}}
  .qcard{animation:slideUp 0.3s ease}
  .fadein{animation:fadein 0.25s ease}
  .pill:hover{transform:scale(1.04);filter:brightness(1.1)}
  .startbtn:hover:not(:disabled){filter:brightness(1.1);transform:translateY(-1px)}
  .choicebtn:hover{border-color:#4f9cf9 !important;transform:translateY(-2px);box-shadow:0 4px 14px rgba(79,156,249,0.2)}
  .backbtn:hover{color:#e6edf3}
  *{box-sizing:border-box}
`;


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
  <script>
    if('serviceWorker' in navigator){
      window.addEventListener('load', ()=>{
        navigator.serviceWorker.register('/sw.js').then(()=>console.log('SW registered'));
      });
    }
  </script>
</body>
</html>
